<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Fundo da página */
      body {
        font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
        background-color: #f4f8fc;
        display: flex;
        justify-content: center;
        padding: 30px;
      }

      /* Card do aluno */
      div {
        width: 350px;
        background: #fffef8;
        border: 3px solid #4a90e2;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
        position: relative;
      }
      /* FOTO DO ALUNO */
      .foto-aluno {
        display: block;
        width: 120px;
        height: 120px;
        margin: 0 auto 15px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #4a90e2;
      }

      /* Simula furos de fichário */
      div::before {
        content: "";
        position: absolute;
        left: -12px;
        top: 20px;
        width: 16px;
        height: 16px;
        background: white;
        border: 2px solid #ccc;
        border-radius: 50%;
        box-shadow:
          0 50px white,
          0 100px white,
          0 150px white;
      }

      /* Nome do aluno */
      h2 {
        color: #2c3e50;
        text-align: center;
        margin-top: 0;
        border-bottom: 2px dashed #4a90e2;
        padding-bottom: 10px;
      }

      /* Informações */
      p {
        color: #444;
        margin: 8px 0;
        line-height: 1.5;
      }

      /* Destaque para os rótulos */
      p:first-of-type,
      p:nth-of-type(2),
      p:nth-of-type(3) {
        font-weight: bold;
      }

      /* Lista de interesses */
      ul {
        margin-top: 5px;
        padding-left: 25px;
      }

      li {
        margin-bottom: 6px;
        color: #333;
      }

      /* Marcadores personalizados */
      li::marker {
        color: #ff9800;
      }

      /* Linha separadora */
      hr {
        margin-top: 15px;
        border: none;
        border-top: 2px dashed #b0bec5;
      }
      div {
        background: repeating-linear-gradient(
          to bottom,
          #fffef8 0px,
          #fffef8 28px,
          #d6eaf8 29px,
          #fffef8 30px
        );
      }
    </style>
    <title>Document</title>
  </head>
  <body></body>
</html>
